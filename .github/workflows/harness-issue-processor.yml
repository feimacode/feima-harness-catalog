name: Process Harness Issue

on:
  issues:
    types: [opened, edited]

jobs:
  process:
    if: startsWith(github.event.issue.title, '[harness-publish]') && !contains(github.event.issue.labels.*.name, 'harness-publish')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse provider from title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          PROVIDER=$(echo "$TITLE" | sed 's/^\[harness-publish\] *//')
          echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
          echo "Provider: $PROVIDER"

      - name: Validate issue has provider
        if: steps.parse.outputs.provider == ''
        run: |
          echo "❌ Could not parse provider from issue title."
          echo "   Title must be: [harness-publish] <provider-name>"
          exit 1

      - name: Label issue
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label 'harness-publish' \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Process issue (write catalog)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PROVIDER: ${{ steps.parse.outputs.provider }}
        run: node scripts/process-harness-issue.js

      - name: Build index
        if: success()
        run: node scripts/build-index.js

      - name: Commit catalog and index
        if: success()
        run: |
          ISSUE_REF="#${{ github.event.issue.number }}"
          PROVIDER="${{ steps.parse.outputs.provider }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add catalogs/${PROVIDER}/catalog.json index.json
          git commit -m "Process [harness-publish] ${PROVIDER} ${ISSUE_REF}" || echo 'No changes to commit'
          git push
